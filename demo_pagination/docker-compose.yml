version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: pagination_mysql
    environment:
      MYSQL_ROOT_PASSWORD: bao12345
      MYSQL_DATABASE: pagination_demo
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database.sql:/docker-entrypoint-initdb.d/database.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  flask_app:
    build: .
    container_name: pagination_flask
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: bao12345
      DB_NAME: pagination_demo
      DB_PORT: 3306
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - .:/app
    command: python app.py

volumes:
  mysql_data:

networks:
  default:
    name: pagination_network
